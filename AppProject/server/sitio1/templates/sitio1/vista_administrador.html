{% extends 'sitio1/base.html' %}
{% load static %}

{% block js %}
    <script>
        function showInProcess() {
            alert('En proceso...');
            return false;  
        }
    </script>
{% endblock %}


{% block css %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{% static 'sitio1/imagenes/FondoVADmin.jpg' %}");
            background-size: cover;
            background-position: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        div {
            margin-bottom: 15px;
        }

        .btn-lg {
            font-size: 2rem; /* Tamaño de letra más grande */
            padding: 15px 30px; /* Aumenta el espacio alrededor del texto */
        }

        .exit-btn {
            position: static;
            bottom: 10px;
            right: 20px;
            font-size: 1.2rem;
            padding: 8px 16px;
        }
    </style>
{% endblock %}


{% block content %}
    <section id="menu" class="menu">
        
            <div class="box-container">
                
                    
                        <div class="box">
                            <div class="box">
                                <a href="{% url 'admin:index' %}" class="btn btn-primary btn-lg" >Administrar Perfiles de Usuario</a>
                            </div>
                        </div>

                        <div class="box">
                            <a href="{% url 'ingredientes' %}" class="btn btn-primary btn-lg">Administrar Productos</a>

                        </div>

                        
                    
                
            </div>
    </section>
    <div>
        <a href="{% url 'home' %}" class="btn btn-secondary exit-btn">Salir</a>
    </div>
{% endblock %}
